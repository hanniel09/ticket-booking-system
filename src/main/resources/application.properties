spring.application.name=tickerBookingSystem

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5430}/ticket-booking
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update

token.secret=supersecret

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=supersecretpassword

spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-indle=8
spring.data.redis.lettuce.pool.min-indle=2
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.lettuce.shutdown-timeout=100ms