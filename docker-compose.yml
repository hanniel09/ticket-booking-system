version: "3.9"

services:
  db:
    image: postgres:17
    container_name: ticker-booking-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ticket-booking
      DB_USER: postgres
      DB_PASSWORD: 123456
      DB_NAME: ticket-booking
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticket-booking-service

  redis:
    image: redis:7.2-alpine
    container_name: ticket-redis
    command: redis-server --appendonly yes --requirepass supersecretpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticket-booking-service

  app:
    build: .
    container_name: ticket-booking-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=supersecretpassword
    depends_on:
      - db
      - redis
    networks:
      - ticket-booking-service

volumes:
  postgres_data:
  redis_data:

networks:
  ticket-booking-service:
